version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: exam-grader-postgres
    environment:
      POSTGRES_DB: examgrader
      POSTGRES_USER: examgrader
      POSTGRES_PASSWORD: examgrader123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examgrader"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - examgrader-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  redis:
    image: redis:latest
    container_name: exam-grader-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - examgrader-network

  guardrails:
    build:
      context: ./services/guardrails
      dockerfile: Dockerfile
    container_name: exam-grader-guardrails
    environment:
      - GUARDRAIL_PORT=9090
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - examgrader-network

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: exam-grader-api
    environment:
      - DATABASE_URL=postgresql://examgrader:examgrader123@postgres:5432/examgrader
      - REDIS_URL=redis://redis:6379
      - LLM_SERVICE_URL=http://llm:8000
      - EMBEDDING_SERVICE_URL=http://embedding:8000
      - AGENT_SERVICE_URL=http://agent:8000
      - GUARDRAIL_SERVICE_URL=http://guardrails:9090
      - OMP_NUM_THREADS=16
      - MKL_NUM_THREADS=16
      - OPENBLAS_NUM_THREADS=16
      - USE_INTEL_MKL=1
      - DNNL_PRIMITIVE_CACHE_CAPACITY=1024
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      guardrails:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - examgrader-network

  # LLM Service with Intel AMX/AVX-512 Optimization
  llm:
    build:
      context: ./services/llm
      dockerfile: Dockerfile
    container_name: exam-grader-llm
    environment:
      - MODEL=Qwen/Qwen2-7B-Instruct
      - PORT=8000
      # Intel AMX Configuration
      - VLLM_TARGET_DEVICE=cpu
      - VLLM_CPU_KVCACHE_SPACE=40
      - VLLM_CPU_AVX512BF16=1
      - VLLM_CPU_OMP_THREADS_BIND=0-31
      # Intel IPEX (Extension for PyTorch)
      - USE_IPEX=1
      - BF16_MODE=1
      # PyTorch Optimizations
      - OMP_NUM_THREADS=32
      - MKL_NUM_THREADS=32
      - USE_INTEL_MKL=1
      - DNNL_PRIMITIVE_CACHE_CAPACITY=1024
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8000"
    volumes:
      - vllm_cache:/root/.cache/vllm
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      retries: 3
    networks:
      - examgrader-network

  embedding:
    build:
      context: ./services/embedding
      dockerfile: Dockerfile
    container_name: exam-grader-embedding
    environment:
      - PORT=8000
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8
      - USE_INTEL_MKL=1
      - DNNL_PRIMITIVE_CACHE_CAPACITY=1024
      - PYTHONUNBUFFERED=1
    ports:
      - "8002:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - examgrader-network

  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    container_name: exam-grader-agent
    environment:
      - API_SERVICE_URL=http://api:8000
      - LLM_SERVICE_URL=http://llm:8000
      - EMBEDDING_SERVICE_URL=http://embedding:8000
      - GUARDRAIL_SERVICE_URL=http://guardrails:9090
      - OMP_NUM_THREADS=16
      - MKL_NUM_THREADS=16
      - USE_INTEL_MKL=1
      - DNNL_PRIMITIVE_CACHE_CAPACITY=1024
      - PYTHONUNBUFFERED=1
    ports:
      - "8003:8000"
    depends_on:
      api:
        condition: service_healthy
      llm:
        condition: service_healthy
      embedding:
        condition: service_healthy
      guardrails:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - examgrader-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: exam-grader-web
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - examgrader-network

volumes:
  postgres_data:
  redis_data:
  vllm_cache:
  huggingface_cache:

networks:
  examgrader-network:
    driver: bridge
